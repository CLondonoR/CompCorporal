<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Seguimiento de Composición Corporal</title>

  <!-- Chart.js + plugin de anotaciones -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    /* ===========
       DARK THEME
       =========== */
    :root{
      --bg-body: #000000;         /* fondo negro */
      --bg-card: #0b0f14;         /* cards/containers */
      --bg-panel:#0f141b;         /* secciones */
      --text:    #e5e7eb;         /* texto primario */
      --muted:   #94a3b8;         /* texto atenuado */
      --border:  #1f2937;         /* bordes sutiles */

      /* Colores eléctricos para líneas */
      --c-cyan:  #00E5FF;
      --c-pink:  #FF4DA6;
      --c-red:   #FF4D4D;
      --c-green: #00FF95;
      --c-amber: #FFB300;
      --c-blue:  #66CCFF;
      --c-violet:#7C4DFF;

      /* Botones */
      --btn1: #0061ff;
      --btn2: #60efff;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg-body);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .container{
      max-width: 1200px;
      margin: 0 auto;
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.5);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .header{
      background: linear-gradient(135deg, #0b1220 0%, #171a23 50%, #0b1220 100%);
      color: var(--text);
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .header h1{ font-size: 1.7rem; margin: 0 0 6px; }
    .header p{ margin:0; color: var(--muted); }

    .content{ padding: 16px; }

    .section{
      margin-bottom: 16px;
      padding: 16px;
      background: var(--bg-panel);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .section h2{
      color: var(--text);
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .form-grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (min-width: 640px){ .form-grid{ grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px){ .form-grid{ grid-template-columns: repeat(3, 1fr); } }

    .form-group{ display:flex; flex-direction:column; }
    label{ font-weight:600; margin-bottom:6px; color: var(--text); }
    input, select{
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: #0a0d13;
      color: var(--text);
      border-radius: 10px;
      font-size: 1rem;
    }
    input::placeholder{ color:#6b7280; }
    input:focus, select:focus{
      outline: none;
      border-color: #334155;
