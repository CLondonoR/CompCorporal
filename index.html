<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Seguimiento de Composición Corporal</title>

  <!-- Chart.js + plugin de anotaciones -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    /* ===========
       MOBILE FIRST
       =========== */
    :root {
      --primary1: #667eea;
      --primary2: #764ba2;
      --text-dark: #333;
      --muted: #666;
      --bg-panel: #f8f9fa;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      background: linear-gradient(135deg, var(--primary1) 0%, var(--primary2) 100%);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--primary1) 0%, var(--primary2) 100%);
      color: #fff;
      padding: 20px 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.6rem;
      margin: 0 0 6px;
    }
    .header p {
      margin: 0;
      opacity: .9;
    }

    .content { padding: 16px; }

    .section {
      margin-bottom: 16px;
      padding: 16px;
      background: var(--bg-panel);
      border-radius: 12px;
      border-left: 4px solid var(--primary1);
    }

    .section h2 {
      color: var(--primary1);
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr; /* mobile */
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group { display: flex; flex-direction: column; }
    label { font-weight: 600; margin-bottom: 6px; color: var(--text-dark); }
    input, select {
      padding: 12px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary1);
      box-shadow: 0 0 0 3px rgba(102,126,234,.15);
    }

    button {
      background: linear-gradient(135deg, var(--primary1) 0%, var(--primary2) 100%);
      color: #fff;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      touch-action: manipulation;
    }
    button:active { transform: scale(.98); }
    button:hover { box-shadow: 0 6px 18px rgba(102,126,234,.35); }
    .btn-danger { background: #dc3545; }

    .alert {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: .95rem;
    }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .hidden { display: none; }

    /* Tablas y tarjetas */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      display: block;
      border-radius: 12px;
    }
    .data-table th, .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
    }
    .data-table th { background: var(--primary1); color: #fff; position: sticky; top: 0; }
    .data-table tr:hover { background: #f3f4f6; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* mobile */
      gap: 12px;
      margin-top: 12px;
    }
    @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(5, 1fr); } }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary1);
    }
    .stat-label { color: var(--muted); margin-top: 6px; font-size: .9rem; }

    .analysis {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .analysis h3 { color: var(--primary1); margin: 0 0 10px; font-size: 1.05rem; }
    .analysis p { margin: 8px 0; }
    .analysis ul { margin: 8px 0 0 18px; }
    .analysis li { margin: 6px 0; }

    .ffmi-highlight {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
      font-size: 1rem;
    }
    .bmr-highlight {
      background: linear-gradient(135deg, var(--primary1) 0%, var(--primary2) 100%);
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      margin: 12px 0;
      font-size: 1rem;
    }
    .calorie-range {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,.25);
      border-radius: 8px;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr; /* mobile */
      gap: 16px;
      margin-top: 10px;
    }
    @media (min-width: 768px) { .charts-grid { grid-template-columns: repeat(2, 1fr); } }

    .chart-wrapper { position: relative; }
    .chart-container { position: relative; height: 260px; }
    @media (min-width: 640px) { .chart-container { height: 300px; } }
    @media (min-width: 768px) { .chart-container { height: 340px; } }
    @media (min-width: 1024px) { .chart-container { height: 380px; } }

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Seguimiento de Composición Corporal</h1>
      <p>Monitorea tu progreso físico de forma inteligente</p>
    </div>

    <div class="content">
      <!-- Datos Personales -->
      <div class="section">
        <h2>👤 Datos Personales</h2>
        <div id="profileAlert" class="alert alert-info hidden"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Estatura (cm):</label>
            <input type="number" id="altura" step="0.1" placeholder="175">
          </div>
          <div class="form-group">
            <label>Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento">
          </div>
          <div class="form-group">
            <label>Género:</label>
            <select id="genero">
              <option value="">Seleccionar</option>
              <option value="masculino">Masculino</option>
              <option value="femenino">Femenino</option>
            </select>
          </div>
        </div>
        <button id="btnGuardarPerfil">💾 Guardar Perfil</button>
        <p style="margin-top:8px; color:#374151; font-size:.95rem">
          Tus datos se guardan en <strong>este dispositivo</strong> (localStorage).
        </p>
      </div>

      <!-- Registrar Medición Diaria -->
      <div class="section">
        <h2>📝 Registrar Nueva Medición</h2>
        <div id="measurementAlert" class="alert alert-success hidden"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Fecha:</label>
            <input type="date" id="fecha">
          </div>
          <div class="form-group">
            <label>Peso (kg):</label>
            <input type="number" id="peso" step="0.1" placeholder="70.5">
          </div>
          <div class="form-group">
            <label>% Grasa Corporal:</label>
            <input type="number" id="porcentajeGrasa" step="0.1" placeholder="15.5">
          </div>
          <div class="form-group">
            <label>Masa Muscular (kg):</label>
            <input type="number" id="masaMuscular" step="0.1" placeholder="55.0">
          </div>
          <div class="form-group">
            <label>VO2 Max (ml/kg/min):</label>
            <input type="number" id="vo2max" step="0.1" placeholder="45.0">
          </div>
        </div>
        <button id="btnAgregarMedicion">➕ Agregar Medición</button>
      </div>

      <!-- Historial de Mediciones -->
      <div class="section">
        <h2>📋 Historial de Mediciones</h2>
        <div id="tablaContainer"></div>
      </div>

      <!-- Gráficas -->
      <div class="section">
        <h2>📈 Evolución Temporal</h2>

        <!-- Peso e IMC -->
        <div class="charts-grid">
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartPeso"></canvas>
            </div>
          </div>
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartIMC"></canvas>
            </div>
          </div>
        </div>

        <!-- Grasa y Músculo -->
        <div class="charts-grid">
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartGrasa"></canvas>
            </div>
          </div>
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartMusculo"></canvas>
            </div>
          </div>
        </div>

        <!-- Edad Metabólica y VO2 Max -->
        <div class="charts-grid">
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartEdadMetabolica"></canvas>
            </div>
          </div>
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartVO2Max"></canvas>
            </div>
          </div>
        </div>

        <!-- FFMI -->
        <div class="charts-grid">
          <div class="chart-wrapper">
            <div class="chart-container">
              <canvas id="chartFFMI"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Estadísticas -->
      <div class="section">
        <h2>📊 Estadísticas Actuales</h2>
        <div id="statsContainer" class="stats-grid"></div>
      </div>

      <!-- Análisis y Conclusiones -->
      <div class="section">
        <h2>🎯 Análisis y Conclusiones</h2>
        <div id="analisisContainer" class="analysis"></div>
      </div>
    </div>
  </div>

  <script>
    // Registrar plugin de anotaciones si está presente (Chart.js v4)
    if (window['chartjs-plugin-annotation']) {
      Chart.register(window['chartjs-plugin-annotation']);
    }

    /* ===============================
       Plugin: Leyenda en esquina (in-chart)
       =============================== */
    const cornerLegendPlugin = {
      id: 'cornerLegend',
      afterDraw(chart, args, opts) {
        const items = (opts && opts.items) || [];
        if (!items.length) return;

        const { ctx, chartArea } = chart;
        const padding = 6;
        const gap = 6;
        const boxW = (opts.boxWidth || 16);
        const boxH = (opts.boxHeight || 12);
        const fontSize = (opts.fontSize || 10);
        const fontFamily = (opts.fontFamily || (Chart.defaults.font && Chart.defaults.font.family) || 'sans-serif');

        // Posición: top-left (aseguramos con layout.padding en cada chart)
        let x = chartArea.left + 6;
        let y = chartArea.top + 6;

        ctx.save();
        ctx.font = `${fontSize}px ${fontFamily}`;

        // Calcular ancho máximo de texto
        let textMax = 0;
        items.forEach(it => { textMax = Math.max(textMax, ctx.measureText(it.label).width); });

        const width = padding*2 + boxW + gap + textMax;
        const height = padding*2 + items.length * (Math.max(boxH, fontSize) + 4) - 4;

        // Fondo semi-transparente con bordes redondeados
        const radius = 8;
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;

        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Dibujar ítems
        let cy = y + padding;
        items.forEach(it => {
          // Caja de color
          ctx.fillStyle = it.color;
          ctx.strokeStyle = 'rgba(0,0,0,0.1)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.rect(x + padding, cy, boxW, boxH);
          ctx.fill();
          ctx.stroke();

          // Texto
          ctx.fillStyle = it.textColor || '#111827';
          ctx.textBaseline = 'top';
          ctx.fillText(it.label, x + padding + boxW + gap, cy - ((boxH - fontSize)/2));
          cy += Math.max(boxH, fontSize) + 4;
        });

        ctx.restore();
      }
    };
    Chart.register(cornerLegendPlugin);

    /* ======================================================
       Almacenamiento: localStorage (dispositivo actual)
       ====================================================== */
    const STORAGE_KEYS = {
      perfil: 'perfil',
      mediciones: 'mediciones'
    };

    /* ======================================================
       Estado, utilidades y cálculos
       ====================================================== */
    let perfil = {};
    let mediciones = [];
    let chartPeso = null;
    let chartIMC = null;
    let chartGrasa = null;
    let chartMusculo = null;
    let chartFFMI = null;
    let chartVO2Max = null;
    let chartEdadMetabolica = null;

    function showAlert(elementId, mensaje) {
      const alert = document.getElementById(elementId);
      alert.textContent = mensaje;
      alert.classList.remove('hidden');
      setTimeout(() => alert.classList.add('hidden'), 2500);
    }

    // Fechas (local, sin desfase)
    function parseLocalDate(iso) {
      if (!iso || typeof iso !== 'string' || !iso.includes('-')) return null;
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function formatFechaTabla(iso) {
      const dt = parseLocalDate(iso);
      return dt ? dt.toLocaleDateString('es-ES') : '';
    }
    function formatEtiquetaCorta(iso) {
      const dt = parseLocalDate(iso);
      return dt ? dt.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '';
    }

    function calcularEdad(fechaNacimientoIso) {
      const nacimiento = parseLocalDate(fechaNacimientoIso);
      if (!nacimiento) return null;
      const hoy = new Date();
      let edad = hoy.getFullYear() - nacimiento.getFullYear();
      const mes = hoy.getMonth() - nacimiento.getMonth();
      if (mes < 0 || (mes === 0 && hoy.getDate() < nacimiento.getDate())) edad--;
      return edad;
    }

    // FFMI Normalizado
    function calcularFFMI(peso, porcentajeGrasa, altura) {
      const ffm = peso * (1 - porcentajeGrasa / 100);
      const h = altura / 100;
      const ffmi = ffm / (h * h);
      return ffmi + 6.1 * (1.8 - h);
    }

    // BMR (Mifflin - St Jeor)
    function calcularBMR(peso, altura, edad, genero) {
      return (genero === 'masculino')
        ? (10 * peso) + (6.25 * altura) - (5 * edad) + 5
        : (10 * peso) + (6.25 * altura) - (5 * edad) - 161;
    }

    // IMC
    function calcularIMC(peso, altura) {
      const h = altura / 100;
      return peso / (h * h);
    }

    // Edad Metabólica (Katch–McArdle vs Mifflin)
    function calcularEdadMetabolica(peso, altura, edadReal, genero, porcentajeGrasa) {
      if (!peso || !altura || !edadReal || !genero || porcentajeGrasa == null || isNaN(porcentajeGrasa)) return null;
      const ffm = peso * (1 - porcentajeGrasa / 100);
      const bmrKatch = 370 + 21.6 * ffm;
      const s = (genero === 'masculino') ? 5 : -161;
      const edadEstim = (10 * peso + 6.25 * altura + s - bmrKatch) / 5;
      return Math.round(Math.max(18, Math.min(90, edadEstim)));
    }

    // Escalado Y dinámico para gráficos (solo charts sin categorías)
    function computeYScale(values, padding = 0.08) {
      const arr = values.filter(v => typeof v === 'number' && !isNaN(v));
      if (arr.length === 0) return {};
      const min = Math.min(...arr);
      const max = Math.max(...arr);
      if (min === max) return { suggestedMin: min - 1, suggestedMax: max + 1 };
      const range = max - min;
      const pad = range * padding;
      return { suggestedMin: Math.floor(min - pad), suggestedMax: Math.ceil(max + pad) };
    }

    // Ítems de leyenda de categorías
    function getLegendItemsIMC() {
      return [
        { label: 'Peligro (35-40)', color: 'rgba(102,16,242,0.4)' },
        { label: 'Obesidad (30-35)', color: 'rgba(220,53,69,0.4)' },
        { label: 'Sobrepeso (25-30)', color: 'rgba(255,152,0,0.4)' },
        { label: 'Normal (20-25)', color: 'rgba(40,167,69,0.4)' },
        { label: 'Bajo peso (15-20)', color: 'rgba(255,193,7,0.4)' }
      ];
    }
    function getLegendItemsFFMI() {
      return [
        { label: 'Extremo',  color: 'rgba(102,16,242,0.4)' },
        { label: 'Superior', color: 'rgba(32,201,151,0.4)' },
        { label: 'Bueno',    color: 'rgba(40,167,69,0.4)' },
        { label: 'Promedio', color: 'rgba(23,162,184,0.4)' }
      ];
    }
    function getLegendItemsVO2() {
      return [
        { label: 'Excelente', color: 'rgba(32,201,151,0.4)' },
        { label: 'Bueno',     color: 'rgba(40,167,69,0.4)' },
        { label: 'Regular',   color: 'rgba(255,193,7,0.4)' },
        { label: 'Bajo',      color: 'rgba(255,152,0,0.4)' },
        { label: 'Muy bajo',  color: 'rgba(220,53,69,0.4)' }
      ];
    }

    // Bandas de VO2 según edad y género (para anotaciones)
    function getVO2Annotations(edad, genero) {
      let a = {};
      if (genero === 'masculino') {
        if (edad < 30) {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:32, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:32, yMax:37, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:37, yMax:43, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:43, yMax:52, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:52, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        } else if (edad < 40) {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:30, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:30, yMax:35, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:35, yMax:40, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:40, yMax:48, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:48, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        } else {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:27, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:27, yMax:31, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:31, yMax:36, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:36, yMax:44, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:44, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        }
      } else {
        if (edad < 30) {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:27, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:27, yMax:31, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:31, yMax:37, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:37, yMax:43, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:43, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        } else if (edad < 40) {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:24, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:24, yMax:28, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:28, yMax:33, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:33, yMax:40, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:40, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        } else {
          a = {
            muyPobre: { type:'box', yMin:20, yMax:21, backgroundColor:'rgba(220,53,69,0.15)', borderWidth:0 },
            pobre:    { type:'box', yMin:21, yMax:25, backgroundColor:'rgba(255,152,0,0.15)', borderWidth:0 },
            regular:  { type:'box', yMin:25, yMax:30, backgroundColor:'rgba(255,193,7,0.15)', borderWidth:0 },
            bueno:    { type:'box', yMin:30, yMax:36, backgroundColor:'rgba(40,167,69,0.15)',  borderWidth:0 },
            excelente:{ type:'box', yMin:36, yMax:60, backgroundColor:'rgba(32,201,151,0.15)', borderWidth:0 }
          };
        }
      }
      return a;
    }

    /* ======================================================
       Carga/Guardado en localStorage
       ====================================================== */
    function lsGet(key, def) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : def;
      } catch { return def; }
    }
    function lsSet(key, val) {
      localStorage.setItem(key, JSON.stringify(val));
    }

    async function cargarDatos() {
      try {
        perfil = lsGet(STORAGE_KEYS.perfil, {});
        mediciones = lsGet(STORAGE_KEYS.mediciones, []);

        // Poblamos UI
        document.getElementById('altura').value = perfil.altura || '';
        document.getElementById('fechaNacimiento').value = perfil.fechaNacimiento || '';
        document.getElementById('genero').value = perfil.genero || '';

        mostrarTabla();
        actualizarGraficas();
        actualizarEstadisticas();
        actualizarAnalisis();
      } catch (e) {
        console.error('Error cargando datos', e);
      }
    }

    async function guardarPerfil() {
      const altura = parseFloat(document.getElementById('altura').value);
      const fechaNacimiento = document.getElementById('fechaNacimiento').value; // ISO YYYY-MM-DD
      const genero = document.getElementById('genero').value;

      if (!altura || !fechaNacimiento || !genero) {
        alert('Por favor completa todos los campos del perfil');
        return;
      }

      perfil = { altura, fechaNacimiento, genero };
      lsSet(STORAGE_KEYS.perfil, perfil);

      showAlert('profileAlert', 'Perfil guardado exitosamente ✓');
      actualizarEstadisticas();
      actualizarAnalisis();
      actualizarGraficas();
    }

    async function agregarMedicion() {
      const fecha = document.getElementById('fecha').value; // ISO YYYY-MM-DD
      const peso = parseFloat(document.getElementById('peso').value);
      const porcentajeGrasa = parseFloat(document.getElementById('porcentajeGrasa').value);
      const masaMuscular = parseFloat(document.getElementById('masaMuscular').value);
      const vo2max = parseFloat(document.getElementById('vo2max').value);

      if (!fecha || !peso || !porcentajeGrasa || !masaMuscular) {
        alert('Por favor completa al menos los campos obligatorios (fecha, peso, grasa, masa muscular)');
        return;
      }

      const medicion = {
        fecha, // guardamos ISO sin convertir a Date (evita TZ)
        peso, porcentajeGrasa, masaMuscular,
        vo2max: isNaN(vo2max) ? null : vo2max,
        id: Date.now()
      };

      mediciones.push(medicion);
      // Ordenar por ISO (seguro y sin TZ)
      mediciones.sort((a, b) => a.fecha.localeCompare(b.fecha));
      lsSet(STORAGE_KEYS.mediciones, mediciones);

      showAlert('measurementAlert', 'Medición agregada exitosamente ✓');

      // Limpiar formulario
      document.getElementById('peso').value = '';
      document.getElementById('porcentajeGrasa').value = '';
      document.getElementById('masaMuscular').value = '';
      document.getElementById('vo2max').value = '';

      mostrarTabla();
      actualizarGraficas();
      actualizarEstadisticas();
      actualizarAnalisis();
    }

    async function eliminarMedicion(id) {
      if (!confirm('¿Estás seguro de eliminar esta medición?')) return;
      mediciones = mediciones.filter(m => m.id !== id);
      lsSet(STORAGE_KEYS.mediciones, mediciones);
      mostrarTabla();
      actualizarGraficas();
      actualizarEstadisticas();
      actualizarAnalisis();
    }

    /* ======================================================
       Tabla, estadísticas, análisis y gráficas
       ====================================================== */
    function mostrarTabla() {
      const container = document.getElementById('tablaContainer');
      if (mediciones.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#666;">No hay mediciones registradas aún.</p>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>';
      html += '<th>Fecha</th><th>Peso (kg)</th><th>% Grasa</th><th>Masa Muscular (kg)</th><th>VO2 Max</th>';
      if (perfil.altura) html += '<th>IMC</th><th>FFMI</th>';
      html += '<th>Acción</th></tr></thead><tbody>';

      mediciones.slice().reverse().forEach(m => {
        const imc = perfil.altura ? calcularIMC(m.peso, perfil.altura).toFixed(1) : 'N/A';
        const ffmi = perfil.altura ? calcularFFMI(m.peso, m.porcentajeGrasa, perfil.altura).toFixed(1) : 'N/A';
        const vo2 = (m.vo2max == null || isNaN(m.vo2max)) ? '-' : m.vo2max.toFixed(1);
        html += `
          <tr>
            <td>${formatFechaTabla(m.fecha)}</td>
            <td>${m.peso.toFixed(1)}</td>
            <td>${m.porcentajeGrasa.toFixed(1)}%</td>

            <td>${vo2}</td>
            ${perfil.altura ? `<td>${imc}</td><td>${ffmi}</td>` : ''}

          </tr>
        `;
      });

      html += '</tbody></table>';

    function actualizarEstadisticas() {

      const edad = perfil.fechaNacimiento ? calcularEdad(perfil.fechaNacimiento) : 'N/A';
      const ffmi = perfil.altura ? calcularFFMI(u.peso, u.porcentajeGrasa, perfil.altura).toFixed(1) : 'N/A';

      let bmr = 'N/A';
      if (perfil.altura && perfil.fechaNacimiento && perfil.genero) {

      let edadMetabolica = 'N/A';
      if (perfil.altura && perfil.fechaNacimiento && perfil.genero && u.porcentajeGrasa != null) {

        const em = calcularEdadMetabolica(u.peso, perfil.altura, edadNum, perfil.genero, u.porcentajeGrasa);

      chartMusculo = new Chart(ctxMusculo, {
        type: 'line',
        data: { labels, datasets: [{ label: 'Masa Muscular (kg)', data: musculos, borderColor: '#006600', backgroundColor: 'rgba(40,167,69,.10)', tension:.35, fill:true, pointRadius:4, pointHoverRadius:6, borderWidth:3 }] },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: { legend:{display:true,position:'top'}, title:{display:true,text:'Masa Muscular',font:{size:14,weight:'bold'}} },
          scales: { y: { ...yMus } }
        }
      });

      // ====== Edad Metabólica (dinámico) ======
      if (perfil.altura && perfil.fechaNacimiento && perfil.genero) {
        const edadReal = calcularEdad(perfil.fechaNacimiento);
        const edadesMet = mediciones.map(m => calcularEdadMetabolica(m.peso, perfil.altura, edadReal, perfil.genero, m.porcentajeGrasa));
        const hay = edadesMet.some(v => v !== null);
        if (hay) {
          const ctxEdad = document.getElementById('chartEdadMetabolica').getContext('2d');
          if (chartEdadMetabolica) chartEdadMetabolica.destroy();
          const yEdad = computeYScale(edadesMet.filter(v => v != null), 0.12);
          chartEdadMetabolica = new Chart(ctxEdad, {
            type:'line',
            data:{ labels, datasets:[{ label:'Edad Metabólica (estimada)', data:edadesMet, borderColor:'#e67e22', backgroundColor:'rgba(230,126,34,.10)', tension:.35, fill:true, pointRadius:4, pointHoverRadius:6, borderWidth:3, spanGaps:true }] },
            options:{
              responsive:true, maintainAspectRatio:false,
              plugins:{
                legend:{display:true,position:'top'},
                title:{display:true,text:'Edad Metabólica (estimada)',font:{size:14,weight:'bold'}},
                annotation:{ annotations:{ lineaEdadReal:{ type:'line', yMin:edadReal, yMax:edadReal, borderColor:'rgba(102,126,234,.85)', borderWidth:3, borderDash:[8,4],
                  label:{ display:true, content:`Edad Real: ${edadReal} años`, position:'end', backgroundColor:'rgba(102,126,234,.85)', color:'#fff', font:{size:10,weight:'bold'} } } } }
              },
              scales:{ y:{ suggestedMin: Math.max(18, (yEdad.suggestedMin ?? (edadReal-15))), suggestedMax: Math.min(90, (yEdad.suggestedMax ?? (edadReal+15))) } }
            }
          });
        }
      }

      // ====== VO2 Max (categorías: Y fijo + leyenda interna) ======
      const vo2Data = mediciones.filter(m => m.vo2max != null && !isNaN(m.vo2max));
      if (vo2Data.length > 0 && perfil.fechaNacimiento && perfil.genero) {
        const edad = calcularEdad(perfil.fechaNacimiento);
        const vo2Labels = vo2Data.map(m => formatEtiquetaCorta(m.fecha));
        const vo2Values = vo2Data.map(m => m.vo2max);
        const ctxVO2 = document.getElementById('chartVO2Max').getContext('2d');
        if (chartVO2Max) chartVO2Max.destroy();
        const vo2Annotations = getVO2Annotations(edad, perfil.genero);
        chartVO2Max = new Chart(ctxVO2, {
          type:'line',
          data:{ labels: vo2Labels, datasets:[{ label:'VO2 Max (ml/kg/min)', data: vo2Values, borderColor:'#0044cc', backgroundColor:'transparent', tension:.35, fill:false, pointRadius:4, pointHoverRadius:6, borderWidth:3 }] },
          options:{
            responsive:true, maintainAspectRatio:false,
            layout: { padding: { left: 96, top: 8 } }, /* espacio para la leyenda interna */
            plugins:{
              legend:{display:true,position:'top'},
              title:{display:true,text:'VO2 Max',font:{size:14,weight:'bold'}},
              annotation:{ annotations: vo2Annotations },
              cornerLegend: {
                items: getLegendItemsVO2(),
                boxWidth: 16, boxHeight: 12, fontSize: 10
              }
            },
            scales:{ y:{ min:20, max:60 } } /* fijo */
          }
        });
      }

      // ====== FFMI (categorías: Y fijo + leyenda interna) ======
      if (perfil.altura) {
        const ffmiValues = mediciones.map(m => calcularFFMI(m.peso, m.porcentajeGrasa, perfil.altura));
        const ctxFFMI = document.getElementById('chartFFMI').getContext('2d');
        if (chartFFMI) chartFFMI.destroy();
        let annotations = {};
        if (perfil.genero === 'masculino') {
          annotations = {
            promedio:{type:'box',yMin:10,yMax:15,backgroundColor:'rgba(23,162,184,.12)',borderWidth:0},
            bueno:{type:'box',yMin:15,yMax:20,backgroundColor:'rgba(40,167,69,.12)',borderWidth:0},
            superior:{type:'box',yMin:20,yMax:25,backgroundColor:'rgba(32,201,151,.12)',borderWidth:0},
            extremo:{type:'box',yMin:25,yMax:30,backgroundColor:'rgba(102,16,242,.12)',borderWidth:0}
          };
        } else {
          annotations = {
            promedio:{type:'box',yMin:10,yMax:15,backgroundColor:'rgba(23,162,184,.12)',borderWidth:0},
            bueno:{type:'box',yMin:15,yMax:20,backgroundColor:'rgba(40,167,69,.12)',borderWidth:0},
            superior:{type:'box',yMin:20,yMax:25,backgroundColor:'rgba(32,201,151,.12)',borderWidth:0},
            extremo:{type:'box',yMin:25,yMax:28,backgroundColor:'rgba(102,16,242,.12)',borderWidth:0}
          };
        }
        chartFFMI = new Chart(ctxFFMI, {
          type:'line',
          data:{ labels, datasets:[{ label:'FFMI (Fat-Free Mass Index)', data: ffmiValues, borderColor:'#007755', backgroundColor:'transparent', tension:.35, fill:false, pointRadius:4, pointHoverRadius:6, borderWidth:3 }] },
          options:{
            responsive:true, maintainAspectRatio:false,
            layout: { padding: { left: 96, top: 8 } }, /* espacio para la leyenda interna */
            plugins:{
              legend:{display:true,position:'top'},
              title:{display:true,text:'FFMI (Índice de Masa Libre de Grasa)',font:{size:14,weight:'bold'}},
              annotation:{ annotations },
              cornerLegend: {
                items: getLegendItemsFFMI(),
                boxWidth: 16, boxHeight: 12, fontSize: 10
              }
            },
            scales:{ y:{ min:10, max:(perfil.genero==='masculino'?30:28) } } /* fijo */
          }
        });
      }
    }

    /* ======================================================
       Inicio y eventos
       ====================================================== */
    window.addEventListener('load', async () => {
      const fechaInput = document.getElementById('fecha');
      if (fechaInput) fechaInput.valueAsDate = new Date();

      await cargarDatos();

      document.getElementById('btnGuardarPerfil').addEventListener('click', guardarPerfil);
      document.getElementById('btnAgregarMedicion').addEventListener('click', agregarMedicion);
    });
  </script>
</body>
</html>
